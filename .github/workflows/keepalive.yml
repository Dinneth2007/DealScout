name: keepalive

# Render free-tier services sleep after ~15 min of idleness; the first
# request after that is a 30-90s cold boot that surfaces as a 502 in the
# UI. A scheduled ping every 10 min keeps both services hot during demo
# hours so recruiters/visitors never hit a cold start.
#
# Caveats: GitHub-hosted cron can drift by 5-15 min under load and may
# skip fires during incidents, so the UI's wake-on-submit retry remains
# the backstop. Manual runs via workflow_dispatch are handy for waking
# the service before a known demo window.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping API /health
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 10 --retry-all-errors \
            https://dealscout-api.onrender.com/health
      - name: Ping UI root
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 10 --retry-all-errors \
            -o /dev/null https://dealscout-ui.onrender.com/
