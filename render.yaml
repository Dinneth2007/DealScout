services:
  - type: web
    name: dealscout-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn dealscout.service.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: src
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: deepseek-chat
      - key: ORCHESTRATOR_MODEL
        value: deepseek-chat
      - key: RESEARCHER_MODEL
        value: deepseek-chat
      - key: INTAKE_MODEL
        value: deepseek-chat

  - type: web
    name: dealscout-ui
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: python -m dealscout.service.ui
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: src
      - key: DEALSCOUT_API_BASE
        value: https://dealscout-api.onrender.com

  # V2 frontend — React + Vite SPA, served as a static site.
  # Static sites on Render's free tier do NOT sleep (unlike Web Services),
  # so this dyno is always-on. Will replace dealscout-ui at Phase C cutover.
  - type: web
    name: dealscout-web
    runtime: static
    buildCommand: cd web && npm ci && npm run build
    staticPublishPath: ./web/dist
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      - key: VITE_API_BASE
        value: https://dealscout-api.onrender.com
    routes:
      # SPA fallback: any unmatched path serves index.html so React Router
      # can handle client-side routing (e.g. /memo/abc123).
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
