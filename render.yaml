services:
  - type: web
    name: dealscout-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn dealscout.service.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: deepseek-chat
      - key: ORCHESTRATOR_MODEL
        value: deepseek-chat
      - key: RESEARCHER_MODEL
        value: deepseek-chat
      - key: INTAKE_MODEL
        value: deepseek-chat

  - type: web
    name: dealscout-ui
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: python -m dealscout.service.ui
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEALSCOUT_API_BASE
        fromService:
          type: web
          name: dealscout-api
          property: host
